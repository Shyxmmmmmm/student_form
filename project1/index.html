<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="../src/output.css" rel="stylesheet">
</head>

<body class="p-2 w-screen h-screen">
    <button id="one"
        class="border p-2 w-32 hover:bg-green-600 cursor-pointer hover:text-white transition duration-300">Click</button>

    <div id="four" class="bg-black opacity-50 w-full h-full absolute top-0 left-0 z-10 hidden">dsag</div>


    <div class="flex justify-center items-center">
        <div id="two" class="border mt-5 w-64 p-3 hidden bg-black text-white relative z-20">
            <p id="three" class="mb-3 text-right pr-3 hover:text-yellow-400 cursor-pointer">X</p>
            <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Dolorum ratione ab recusandae nesciunt, enim
                reiciendis exercitationem veniam corrupti nobis necessitatibus architecto aspernatur commodi nostrum
                beatae nulla! Consequuntur eligendi repudiandae harum.</p>
        </div>
    </div>


    <script>
        var a = document.getElementById("one")
        var b = document.getElementById("two")
        var c = document.getElementById("three")
        var d = document.getElementById("four")
        a.addEventListener('click', function () {
            b.style.display = 'block'
            d.style.display='block'
        })

        c.addEventListener('click', function () {
            b.style.display = 'none'
            d.style.display='none'
        })
    </script>

</body>

</html>
