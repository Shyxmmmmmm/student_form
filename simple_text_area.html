<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="../src/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body style="background-color: #D3D3D3;" class="flex flex-col z-10 justify-center items-center h-screen p-5">
    <div class="flex flex-col z-20 bg-white p-6 rounded-xl w-110 shadow-lg">
        <h1 class="text-2xl font-bold text-center ">Message</h1>
        <textarea name="" id="one" class="border border-gray-500 mt-2 h-40 p-2 rounded resize-none"
            placeholder="Type Something..."></textarea>
        <p class="text-gray-400 text-sm">200 characters max</p>
        <p id="four"></p>
        <div class="mt-4">
            <button id="two" class="py-2 border w-16 rounded bg-blue-500 text-white hover:bg-blue-950"><i
                    class="fa-regular fa-copy" style="color: rgb(255, 255, 255);"></i>Copy</button>
            <button id="three" class="py-2 border w-16 rounded  bg-blue-500 text-white hover:bg-blue-950"><i
                    class="fa-solid fa-eraser" style="color: rgb(255, 255, 255);"></i>Clear</button>
        </div>
    </div>


    <script>
        var a = document.getElementById("one")
        var b = document.getElementById("two")
        var c = document.getElementById("three")
        var d = document.getElementById('four')

        c.addEventListener("click", function () {
            a.value = ""
        })

        b.addEventListener("click", function () {
            d.textContent = "Text copied!"
            d.style.color = 'Green'

            setTimeout(function(){
                d.textContent=""
            }, 2000);
        })
    </script>
</body>

</html>
